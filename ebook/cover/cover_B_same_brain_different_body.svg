<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softB" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="2400" fill="url(#bgB)"/>

  <!-- 상단 브랜드 -->
  <g transform="translate(120, 180)">
    <rect width="70" height="3" fill="#FBBF24"/>
    <text x="95" y="8" font-family="Inter, sans-serif" font-size="28" letter-spacing="6" fill="#FFFFFF" font-weight="500">ALL THAT AI · VOL. 01</text>
  </g>

  <!-- 상단 : 자동차 실루엣 -->
  <g transform="translate(220, 640)">
    <text x="0" y="-28" font-family="Inter, sans-serif" font-size="22" fill="#FBBF24" letter-spacing="4">VEHICLE</text>
    <path fill="#FBBF24" d="M0,210 C20,180 60,150 140,130 C180,90 240,60 360,55 C480,50 600,80 680,130 C780,150 840,180 860,210 L860,250 L820,250 C820,220 800,205 775,205 C750,205 730,220 730,250 L180,250 C180,220 160,205 135,205 C110,205 90,220 90,250 L40,250 Z"/>
    <circle cx="135" cy="250" r="40" fill="#0F172A" stroke="#FBBF24" stroke-width="8"/>
    <circle cx="775" cy="250" r="40" fill="#0F172A" stroke="#FBBF24" stroke-width="8"/>
    <!-- 창 -->
    <path fill="#0F172A" d="M250,130 L360,75 L490,75 L600,130 Z"/>
    <!-- 카메라 렌즈 점 -->
    <circle cx="460" cy="95" r="5" fill="#FFFFFF"/>
  </g>

  <!-- 중앙 공유 신경망 그래프 -->
  <g transform="translate(300, 1050)" stroke="#FBBF24" stroke-width="2" fill="none">
    <!-- 노드들 -->
    <g fill="url(#amber)" stroke="none">
      <circle cx="0" cy="0" r="14"/><circle cx="0" cy="80" r="14"/><circle cx="0" cy="160" r="14"/><circle cx="0" cy="240" r="14"/>
      <circle cx="250" cy="40" r="14"/><circle cx="250" cy="120" r="14"/><circle cx="250" cy="200" r="14"/>
      <circle cx="500" cy="0" r="14"/><circle cx="500" cy="80" r="14"/><circle cx="500" cy="160" r="14"/><circle cx="500" cy="240" r="14"/>
      <circle cx="750" cy="80" r="14"/><circle cx="750" cy="160" r="14"/>
      <circle cx="1000" cy="0" r="14"/><circle cx="1000" cy="80" r="14"/><circle cx="1000" cy="160" r="14"/><circle cx="1000" cy="240" r="14"/>
    </g>
    <!-- 연결선 -->
    <g opacity="0.55">
      <path d="M0,0 L250,40 M0,0 L250,120 M0,80 L250,40 M0,80 L250,120 M0,80 L250,200 M0,160 L250,120 M0,160 L250,200 M0,240 L250,200"/>
      <path d="M250,40 L500,0 M250,40 L500,80 M250,120 L500,80 M250,120 L500,160 M250,200 L500,160 M250,200 L500,240"/>
      <path d="M500,0 L750,80 M500,80 L750,80 M500,80 L750,160 M500,160 L750,80 M500,160 L750,160 M500,240 L750,160"/>
      <path d="M750,80 L1000,0 M750,80 L1000,80 M750,80 L1000,160 M750,160 L1000,80 M750,160 L1000,160 M750,160 L1000,240"/>
    </g>
    <text x="500" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" fill="#FBBF24" letter-spacing="3">SAME BRAIN, DIFFERENT BODY</text>
  </g>

  <!-- 하단 : 휴머노이드 실루엣 -->
  <g transform="translate(620, 1540)" fill="#FBBF24">
    <!-- 머리 -->
    <circle cx="180" cy="50" r="48"/>
    <!-- 목 -->
    <rect x="165" y="95" width="30" height="22"/>
    <!-- 어깨/가슴 -->
    <path d="M90,130 Q180,110 270,130 L260,200 L100,200 Z"/>
    <!-- 몸통 -->
    <rect x="115" y="200" width="130" height="160" rx="8"/>
    <!-- 팔 -->
    <rect x="55" y="140" width="30" height="180" rx="12"/>
    <rect x="275" y="140" width="30" height="180" rx="12"/>
    <rect x="48" y="315" width="44" height="80" rx="8"/>
    <rect x="268" y="315" width="44" height="80" rx="8"/>
    <!-- 다리 -->
    <rect x="120" y="365" width="50" height="180" rx="8"/>
    <rect x="190" y="365" width="50" height="180" rx="8"/>
    <rect x="110" y="540" width="65" height="28" rx="4"/>
    <rect x="185" y="540" width="65" height="28" rx="4"/>
    <!-- 가슴 카메라 -->
    <circle cx="180" cy="255" r="12" fill="#0F172A"/>
    <circle cx="180" cy="255" r="5" fill="#FFFFFF"/>
  </g>

  <!-- 제목 -->
  <g transform="translate(120, 1960)">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-weight="900" font-size="120" fill="#FFFFFF" letter-spacing="-3">
      <tspan x="0" dy="0">테슬라처럼 만드는</tspan>
      <tspan x="0" dy="140">비전 자율주행과</tspan>
    </text>
    <text font-family="Pretendard, sans-serif" font-weight="900" font-size="120" fill="#FBBF24" letter-spacing="-3">
      <tspan x="0" dy="280">피지컬 AI</tspan>
    </text>
  </g>

  <!-- 부제/저자 -->
  <g transform="translate(120, 2320)">
    <text font-family="Pretendard, sans-serif" font-size="28" fill="#FFFFFF" opacity="0.75">
      카메라 한 대에서 Optimus까지   ·   이석창 지음
    </text>
  </g>
</svg>
