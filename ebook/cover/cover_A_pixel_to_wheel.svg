<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" preserveAspectRatio="xMidYMid meet">
  <!-- ==================== 배경 ==================== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0E"/>
      <stop offset="45%" stop-color="#0F1525"/>
      <stop offset="100%" stop-color="#090910"/>
    </linearGradient>
    <radialGradient id="accent" cx="50%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#E63946" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pixelFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#F1FAEE"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect width="1600" height="2400" fill="url(#accent)"/>

  <!-- 상단 브랜드 바 -->
  <g transform="translate(120, 180)">
    <rect x="0" y="0" width="70" height="3" fill="#E63946"/>
    <text x="95" y="8" font-family="Inter, Helvetica, sans-serif" font-size="28" letter-spacing="6" fill="#F1FAEE" font-weight="500">ALL&#160;THAT&#160;AI&#160;&#160;·&#160;&#160;VOL.&#160;01</text>
  </g>

  <!-- ==================== 중앙 일러스트 : 픽셀 → 스티어링 휠 ==================== -->
  <!-- 왼쪽 : 카메라 픽셀 격자 (해체되는 모습) -->
  <g transform="translate(220, 780)" filter="url(#glow)">
    <!-- 격자 틀 -->
    <rect x="0" y="0" width="380" height="380" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="6 8" opacity="0.6"/>
    <text x="0" y="-24" font-family="Inter, sans-serif" font-size="22" fill="#E63946" letter-spacing="4">PHOTON IN</text>

    <!-- 픽셀 블록들 (촘촘한 왼쪽 → 흩어지는 오른쪽) -->
    <g fill="#E63946">
      <rect x="10" y="10" width="30" height="30"/><rect x="45" y="10" width="30" height="30" opacity="0.9"/><rect x="80" y="10" width="30" height="30" opacity="0.95"/><rect x="115" y="10" width="30" height="30" opacity="0.7"/>
      <rect x="10" y="45" width="30" height="30" opacity="0.85"/><rect x="45" y="45" width="30" height="30"/><rect x="80" y="45" width="30" height="30" opacity="0.9"/><rect x="115" y="45" width="30" height="30" opacity="0.6"/><rect x="150" y="45" width="30" height="30" opacity="0.5"/>
      <rect x="10" y="80" width="30" height="30" opacity="0.9"/><rect x="45" y="80" width="30" height="30" opacity="0.95"/><rect x="80" y="80" width="30" height="30"/><rect x="115" y="80" width="30" height="30" opacity="0.75"/><rect x="150" y="80" width="30" height="30" opacity="0.6"/><rect x="185" y="80" width="30" height="30" opacity="0.35"/>
      <rect x="10" y="115" width="30" height="30" opacity="0.7"/><rect x="45" y="115" width="30" height="30" opacity="0.8"/><rect x="80" y="115" width="30" height="30" opacity="0.85"/><rect x="115" y="115" width="30" height="30" opacity="0.6"/><rect x="150" y="115" width="30" height="30" opacity="0.45"/>
      <rect x="10" y="150" width="30" height="30" opacity="0.6"/><rect x="45" y="150" width="30" height="30" opacity="0.7"/><rect x="80" y="150" width="30" height="30" opacity="0.5"/><rect x="115" y="150" width="30" height="30" opacity="0.35"/>
      <rect x="10" y="185" width="30" height="30" opacity="0.5"/><rect x="45" y="185" width="30" height="30" opacity="0.45"/><rect x="80" y="185" width="30" height="30" opacity="0.3"/>
      <rect x="10" y="220" width="30" height="30" opacity="0.35"/><rect x="45" y="220" width="30" height="30" opacity="0.25"/>
      <rect x="10" y="255" width="30" height="30" opacity="0.22"/>
    </g>
  </g>

  <!-- 중앙 흐름선 (픽셀 → 휠) -->
  <g transform="translate(620, 900)">
    <g stroke="url(#pixelFade)" stroke-width="3" fill="none" opacity="0.85">
      <path d="M0 80 Q 180 40 340 140" stroke-dasharray="10 10"/>
      <path d="M0 140 Q 180 160 340 140"/>
      <path d="M0 200 Q 180 240 340 140" stroke-dasharray="10 10"/>
    </g>
    <!-- 흐름 점들 -->
    <g fill="#F1FAEE">
      <circle cx="100" cy="110" r="3"/><circle cx="180" cy="130" r="3"/><circle cx="260" cy="140" r="3"/>
      <circle cx="100" cy="180" r="2"/><circle cx="200" cy="200" r="2"/>
    </g>
  </g>

  <!-- 오른쪽 : 스티어링 휠 -->
  <g transform="translate(1060, 1020)" filter="url(#glow)">
    <text x="-30" y="-24" font-family="Inter, sans-serif" font-size="22" fill="#F1FAEE" letter-spacing="4" text-anchor="start">CONTROL OUT</text>
    <!-- 외곽 원 -->
    <circle cx="140" cy="140" r="135" fill="none" stroke="#F1FAEE" stroke-width="6"/>
    <circle cx="140" cy="140" r="135" fill="none" stroke="#E63946" stroke-width="2" opacity="0.5"/>
    <!-- 내부 허브 -->
    <circle cx="140" cy="140" r="34" fill="#F1FAEE"/>
    <circle cx="140" cy="140" r="34" fill="#E63946" opacity="0.15"/>
    <!-- 스포크 -->
    <rect x="132" y="38" width="16" height="68" fill="#F1FAEE"/>
    <rect x="52" y="132" width="68" height="16" fill="#F1FAEE"/>
    <rect x="160" y="132" width="68" height="16" fill="#F1FAEE"/>
    <!-- 하단 두꺼운 부분 -->
    <path d="M40 140 Q140 280 240 140" stroke="#F1FAEE" stroke-width="28" fill="none"/>
    <path d="M40 140 Q140 280 240 140" stroke="#E63946" stroke-width="2" fill="none" opacity="0.55"/>
  </g>

  <!-- ==================== 제목부 ==================== -->
  <g transform="translate(120, 1560)">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-weight="800" font-size="128" fill="#F1FAEE" letter-spacing="-4">
      <tspan x="0" dy="0">테슬라처럼</tspan>
      <tspan x="0" dy="150">만드는</tspan>
    </text>
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-weight="900" font-size="110" fill="#E63946" letter-spacing="-3">
      <tspan x="0" dy="230">비전 자율주행과</tspan>
      <tspan x="0" dy="135">피지컬 AI</tspan>
    </text>
  </g>

  <!-- 부제 -->
  <g transform="translate(120, 2190)">
    <rect x="0" y="0" width="50" height="2" fill="#F1FAEE" opacity="0.6"/>
    <text x="70" y="8" font-family="Pretendard, sans-serif" font-size="32" fill="#F1FAEE" opacity="0.85" letter-spacing="-1">
      카메라 한 대에서 Optimus까지, 픽셀이 핸들이 되는 여정
    </text>
  </g>

  <!-- 저자명 -->
  <g transform="translate(120, 2280)">
    <text font-family="Pretendard, sans-serif" font-size="40" fill="#F1FAEE" font-weight="600" letter-spacing="-1">
      이석창 지음
    </text>
  </g>

  <!-- 우측 하단 플랫폼 라벨 -->
  <g transform="translate(1480, 2340)">
    <text text-anchor="end" font-family="Inter, sans-serif" font-size="20" fill="#F1FAEE" opacity="0.45" letter-spacing="3">LEELANG7 · @AIDOER</text>
  </g>
</svg>
