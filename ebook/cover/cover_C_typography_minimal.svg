<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" preserveAspectRatio="xMidYMid meet">
  <rect width="1600" height="2400" fill="#FFFFFF"/>

  <!-- 좌측 오렌지 컬럼 -->
  <rect x="0" y="0" width="96" height="2400" fill="#FF6B35"/>
  <text x="48" y="1200" font-family="Inter, sans-serif" font-size="22" fill="#FFFFFF" letter-spacing="8"
        transform="rotate(-90 48 1200)" text-anchor="middle">ALL THAT AI · 2026</text>

  <!-- 상단 작은 라벨 -->
  <g transform="translate(180, 280)">
    <rect x="0" y="0" width="180" height="3" fill="#FF6B35"/>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="26" fill="#FF6B35" letter-spacing="6" font-weight="700">TESLA · PHYSICAL AI · 2026</text>
  </g>

  <!-- "테슬라처럼 만드는" 소형 -->
  <text x="180" y="560" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-weight="500" font-size="72" fill="#2D3436" letter-spacing="-2">
    테슬라처럼 만드는
  </text>

  <!-- 대형 메인 타이포 -->
  <g transform="translate(180, 700)">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-weight="900" font-size="180" fill="#2D3436" letter-spacing="-6">
      <tspan x="0" dy="0">비전</tspan>
      <tspan x="0" dy="200">자율주행</tspan>
    </text>
    <text font-family="Pretendard, sans-serif" font-weight="900" font-size="100" fill="#FF6B35" letter-spacing="-2">
      <tspan x="0" dy="420">그리고</tspan>
    </text>
    <text font-family="Pretendard, sans-serif" font-weight="900" font-size="180" fill="#2D3436" letter-spacing="-6">
      <tspan x="0" dy="580">피지컬 AI</tspan>
    </text>
  </g>

  <!-- 구분선 -->
  <line x1="180" y1="1830" x2="500" y2="1830" stroke="#FF6B35" stroke-width="4"/>

  <!-- 부제 -->
  <g transform="translate(180, 1900)">
    <text font-family="Pretendard, sans-serif" font-size="38" fill="#2D3436" font-weight="500" letter-spacing="-1">
      <tspan x="0" dy="0">카메라 한 대에서 Optimus까지,</tspan>
      <tspan x="0" dy="60">픽셀이 핸들이 되는 여정.</tspan>
    </text>
  </g>

  <!-- 장 번호 장식 (작은 인덱스) -->
  <g transform="translate(180, 2120)" font-family="Inter, sans-serif" font-size="22" fill="#2D3436" opacity="0.55" letter-spacing="4">
    <text x="0" y="0">FSD v13 &#160;&#160;·&#160;&#160; OCCUPANCY NETWORK &#160;&#160;·&#160;&#160; DAgger</text>
    <text x="0" y="36">OPTIMUS &#160;&#160;·&#160;&#160; VLA &#160;&#160;·&#160;&#160; ISAAC LAB &#160;&#160;·&#160;&#160; ROS2</text>
  </g>

  <!-- 저자명 -->
  <text x="180" y="2280" font-family="Pretendard, sans-serif" font-weight="700" font-size="48" fill="#2D3436" letter-spacing="-1">
    이석창 지음
  </text>

  <!-- 우측 하단 작은 메타 -->
  <text x="1520" y="2320" text-anchor="end" font-family="Inter, sans-serif" font-size="20" fill="#2D3436" opacity="0.5" letter-spacing="3">
    LEELANG7 · @AIDOER
  </text>
</svg>
